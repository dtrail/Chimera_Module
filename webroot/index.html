<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimera Familia Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>🐉 CHIMERA FAMILIA</h2>

    <div class="dashboard">
        <div class="dash-item">
            <span class="dash-val" id="stat-total-blocked">0</span>
            <span class="dash-label">Blocked Events</span>
        </div>
        <div class="dash-item">
            <span class="dash-val" id="stat-active-profile">-</span>
            <span class="dash-label">Active Rules</span>
        </div>
    </div>

    <div class="card">
        <h3>Master Controls</h3>
        <button class="btn-main" id="btn-enable">Enable Chimera</button>
        <button class="btn-main" id="btn-disable" style="background: #333; color: white;">Disable Chimera</button>
    </div>

    <div class="card">
        <h3>Active Blocklist Profile</h3>
        <div id="blocklist-content">
            <p style="color: #555;">Reading config...</p>
        </div>
    </div>

    <div class="card">
        <h3>Live Analytics</h3>
        <button class="btn-main" id="btn-refresh" style="background: #222; color: var(--accent); border: 1px solid var(--accent);">↻ Refresh Data</button>
        <div id="wakelock-list">
            <p style="text-align: center; color: #555;">Initializing...</p>
        </div>
    </div>

    <div class="card">
        <h3>Add Manual Entry</h3>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="custom-wl-input" placeholder="Wakelock Name...">
            <button class="btn-block" id="btn-add-custom">Block</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
